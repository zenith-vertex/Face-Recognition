thresholds:
  cosine: 0.6
  euclidean: 0.4

default_detector: haar
default_embedder: dlib

models:
  haar:
    cascade_path: haarcascade_frontalface_default.xml
  yolov8:
    model_path: yolov8n-face.pt
    download_url: https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n-face.pt

margin_ratio: 0.15

device: cpu