version: "3.9"
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: faceuser
      POSTGRES_PASSWORD: facepass
      POSTGRES_DB: facerecognition
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://faceuser:facepass@db:5432/facerecognition
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-real-secret}
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  pgdata:
